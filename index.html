<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>montevideo-gris</title>
    <meta name="description" content="Un registro diario de cuánto sol, gris o lluvia hace en Montevideo, Uruguay." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="masthead">
        <div>
          <h1>☁️ montevideo<em>-gris</em></h1>
          <p class="dek">Un intento por armar un mapa de los días grises de la ciudad: sol, nubes o lluvia, un cuadradito por día.</p>
        </div>
        <div class="today-chip" id="today-chip">
          <span class="label">Cargando…</span>
          <span class="today-pill"></span>
          <button class="theme-toggle" id="theme-toggle" type="button">···</button>
        </div>
      </header>

      <ul class="legend">
        <li class="legend-chip"><span class="swatch" style="background: var(--sol)"></span><span class="emoji">☀️</span> <strong>0</strong>&nbsp;sol</li>
        <li class="legend-chip"><span class="swatch" style="background: var(--gris)"></span><span class="emoji">☁️</span> <strong>1</strong>&nbsp;gris, nuboso, poca visibilidad</li>
        <li class="legend-chip"><span class="swatch" style="background: var(--lluvia)"></span><span class="emoji">🌧️</span> <strong>2</strong>&nbsp;lluvia en algún momento del día</li>
      </ul>

      <main id="years"></main>

      <footer class="colophon">
        <span>fuente: estación 12V</span>
        <a href="https://raw.githubusercontent.com/lu1aat/montevideo-gris/main/data.csv">datos (csv)</a>
        <a href="https://github.com/lu1aat/montevideo-gris">código fuente</a>
        <a href="LICENSE">licencia CC0</a>
      </footer>
    </div>

    <div id="tooltip" role="tooltip"></div>

    <script src="app.js"></script>
  </body>
</html>
